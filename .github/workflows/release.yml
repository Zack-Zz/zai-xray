name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          BIN_NAME=zai
          if [ "$GOOS" = "windows" ]; then BIN_NAME=zai.exe; fi
          go build -o "dist/${BIN_NAME}" ./cmd/zai
          ARCHIVE="zai_${{ github.ref_name }}_${GOOS}_${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            cd dist && zip "${ARCHIVE}.zip" "${BIN_NAME}"
          else
            cd dist && tar -czf "${ARCHIVE}.tar.gz" "${BIN_NAME}"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zai-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
